<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CAD-Intel AI - Analysis</title>
  <link rel="stylesheet" href="/static/styles.css" />
</head>
<body>
  <div class="container">
    <header class="topbar">
      <div class="brand-wrap">
        <button
          class="ai-orb"
          type="button"
          aria-label="AI Analysis Engine Active"
          data-tooltip="AI Analysis Engine Active"
        ></button>
        <div class="brand">CAD-Intel AI</div>
      </div>
      <div class="top-actions">
        <img class="logo-slot" src="/static/logo.jpg" alt="Company logo" />
      </div>
    </header>
    <nav class="nav">
      <a href="/">Dashboard</a>
      <a class="active" href="/analysis.html">Analysis</a>
      <a href="/library.html">Asset Library</a>
    </nav>

    <section class="analysis-layout">
      <div class="viewer-wrap">
        <h3>3D Viewer</h3>
        <div id="viewerCanvas"></div>
        <div class="actions-row">
          <button id="captureBtn" class="analysis-action-btn">
            <span class="btn-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path d="M4 6h3l1.2-2h7.6L17 6h3a2 2 0 0 1 2 2v9a3 3 0 0 1-3 3H5a3 3 0 0 1-3-3V8a2 2 0 0 1 2-2Zm8 12a5 5 0 1 0 0-10 5 5 0 0 0 0 10Zm0-2.2a2.8 2.8 0 1 1 0-5.6 2.8 2.8 0 0 1 0 5.6Z"/>
              </svg>
            </span>
            <span>Run Auto-Analyzer</span>
          </button>
          <button id="summarizeBtn" class="analysis-action-btn">
            <span class="btn-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path d="M4 4h16v10H7.5L4 17.5V4Zm4 4h8v2H8V8Zm0 4h5v2H8v-2Z"/>
              </svg>
            </span>
            <span>Generate AI Analysis</span>
          </button>
          <button id="openExtractionEngineBtn" class="analysis-action-btn">
            <span class="btn-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path d="m14.2 2 1 2.4 2.6.8-.8 2.6 2 1.8-2 1.8.8 2.6-2.6.8-1 2.4-2.4-1-2.4 1-1-2.4-2.6-.8.8-2.6-2-1.8 2-1.8-.8-2.6 2.6-.8 1-2.4 2.4 1 2.4-1ZM12 9.1A2.9 2.9 0 1 0 12 15a2.9 2.9 0 0 0 0-5.8Z"/>
              </svg>
            </span>
            <span>Customize Extraction Engine</span>
          </button>
          <button id="downloadAnalysisBtn" class="analysis-action-btn">
            <span class="btn-icon" aria-hidden="true">
              <svg viewBox="0 0 24 24" focusable="false">
                <path d="M12 3v10.2l3.2-3.2 1.6 1.6-6 6-6-6 1.6-1.6 3.2 3.2V3H12Zm-7 16h14v2.2H5V19Z"/>
              </svg>
            </span>
            <span>Download Analysis</span>
          </button>
        </div>
      </div>

      <aside class="panel">
        <h3>Intelligence Panel</h3>
        <table class="meta-table">
          <tbody id="metaRows"></tbody>
        </table>
        <div id="summaryBox" class="summary-callout">Summary will appear here.</div>
      </aside>
    </section>
  </div>

  <div id="extractionEngineModal" class="modal hidden" role="dialog" aria-modal="true" aria-labelledby="extractionEngineTitle">
    <div class="modal-card extraction-modal-card">
      <h3 id="extractionEngineTitle">Edit Extraction Engine</h3>
      <p class="subtle">Define role, objectives, and dynamic sections. This builds the final prompt used for summary generation.</p>
      <label class="engine-label" for="engineRoleInput">Role</label>
      <input id="engineRoleInput" class="text-input" type="text" placeholder="You are a senior..." />

      <label class="engine-label" for="engineObjectiveInput">Objectives (one line each)</label>
      <textarea id="engineObjectiveInput" class="engine-textarea" rows="3" placeholder="Analyze the CAD image...&#10;Your task is NOT to recreate..."></textarea>

      <div class="engine-head-row">
        <h4>Sections</h4>
        <button id="addEngineSectionBtn" class="mini-btn" type="button">Add Section</button>
      </div>
      <div id="engineSections" class="engine-sections"></div>

      <label class="engine-label" for="engineClosingInput">Final Instructions (one line each)</label>
      <textarea id="engineClosingInput" class="engine-textarea" rows="4" placeholder="Be precise.&#10;Use millimeters."></textarea>

      <div class="actions-row">
        <button id="saveEngineConfigBtn" type="button">Save Extraction Engine</button>
        <button id="closeEngineConfigBtn" class="mini-btn" type="button">Close</button>
      </div>
      <p id="engineConfigStatus" class="subtle"></p>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/occt-import-js@0.0.12/dist/occt-import-js.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/dxf-parser@1.1.2/dist/dxf-parser.min.js"></script>
  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.168.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.168.0/examples/jsm/"
      }
    }
  </script>
  <script type="module" src="/static/js/analysis.js"></script>
</body>
</html>
